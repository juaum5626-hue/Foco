<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volte a estudar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    font-family:"Inter",sans-serif;

}

/* brilho suave */

body::before{

content:"";

position:absolute;

width:900px;

height:900px;

background:radial-gradient(circle,
rgba(255,255,255,.03),
transparent 70%);

filter:blur(60px);

}

.container{

position:relative;

text-align:center;

animation:fade .8s ease;

z-index:1;

}

img{
    width:180px;
    margin-bottom:28px;
    filter:drop-shadow(0 0 10px rgba(255,255,255,.15));
}

h1{

color:#fff;

font-size:74px;

font-weight:800;

letter-spacing:-3px;

line-height:1;

text-shadow:0 0 12px rgba(255,255,255,.08);

}

p{

margin-top:18px;

font-size:26px;

font-weight:400;

color:#9d9d9d;

letter-spacing:-.4px;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(12px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<img src="livro.png" alt="Livro">

<h1>Volte a estudar.</h1>

<p>O seu futuro é construído no foco de hoje.</p>

</div>

</body>

</html>
